version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install -r requirements.txt
run:
  runtime-version: "3.11"
  command: uvicorn app.api.main:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
    env: APP_PORT
  env:
    - name: PYTHONPATH
      value: "."
    - name: ALLOWED_ORIGINS
      value: "https://main.YOUR_AMPLIFY_ID.amplifyapp.com"
